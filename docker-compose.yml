services:
  vision_engine:
    build: ./vision
    container_name: m1_vision
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      VISION_SHARED_DIR: /app/data/vision
      VISION_SOURCE: ""
      VISION_RECONNECT_DELAY: "7"
      VISION_IMAGE_SIZE: "320"

  database:
    image: postgres:14
    container_name: m2_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gam_traffic
    ports:
      - "5432:5432"

  api_service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: m2_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      VISION_HEALTH_PATH: /app/data/vision/health.json
      VISION_EVENTS_PATH: /app/data/vision/events.json
    depends_on:
      - database

  frontend_app:
    build: ./frontend
    container_name: m3_frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://api_service:8000
      EVENTS_WS_URL: ws://api_service:8000/events
      MEDIA_BASE_URL: http://localhost:8000
      VIDEO_STREAM_URL: ""
      MOCK_MODE: "false"
    depends_on:
      - api_service
